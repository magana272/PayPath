services:
  mongo:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret_password
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1})"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    environment:
      MONGODB_URI: mongodb://admin:secret_password@mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
